                - generic [ref=e138]:
                  - paragraph [ref=e139]: "The keyword checker provides the following valuable metrics for any keyword you enter:"
                  - list [ref=e140]:
                    - listitem [ref=e141]: "Keyword Difficulty: How challenging it will be to rank in the top 10 Google search results for the keyword. Presented as a percent, keywords with higher difficulty scores will be more difficult to rank for."
                    - listitem [ref=e142]: "Monthly Search Volume: How many times people search for the keyword each month. Keywords with higher search volumes have the potential to drive more traffic, but are typically more competitive."
                    - listitem [ref=e143]: "Search Intent: The purpose of the search behind the keyword. This information can help guide your SEO and content strategy."
                    - listitem [ref=e144]: "Average CPC: The average cost-per-click of the keyword in Google Ads. Higher CPC typically indicates greater competition."
                    - listitem [ref=e145]: "SERP Analysis: The top 10 ranking pages for the keyword, including their domain authorities and content types. Use this information to assess your competition and determine what it might take to rank above them."
                  - paragraph [ref=e146]: This data from our Keyword Overview tool helps you identify high-opportunity keywords, understand the competitive landscape, and build a more effective SEO strategy.
            - generic [ref=e147]:
              - heading "How We Calculate Keyword Difficulty" [level=2] [ref=e148]
              - generic [ref=e149]: "We calculate keyword difficulty using three key factors that can affect your ability to rank:"
              - list [ref=e150]:
                - listitem [ref=e151]:
                  - img "illustrated checkbox" [ref=e153]
                  - generic [ref=e154]:
                    - heading "Backlink Strength of Top Results" [level=3] [ref=e155]
                    - generic [ref=e156]: We analyze both the quantity and quality of backlinks pointing to the top 10 ranking pages. The more high-authority sites linking to the current top results, the higher the difficulty score.
                - listitem [ref=e157]:
                  - img "illustrated checkbox" [ref=e159]
                  - generic [ref=e160]:
                    - heading "Domain Authority Factors" [level=3] [ref=e161]
                    - generic [ref=e162]: We examine the median authority score of domains currently ranking on page one. Higher authority domains mean tougher competition and a higher difficulty score.
                - listitem [ref=e163]:
                  - img "illustrated checkbox" [ref=e165]
                  - generic [ref=e166]:
                    - heading "SERP Features & Keyword Context" [level=3] [ref=e167]
                    - generic [ref=e168]: We determine whether Google displays special features in its search results like AI Overviews, featured snippets, knowledge panels, and local packs. We also consider whether the keyword is branded, which typically makes ranking more challenging for non-brand sites.
            - generic [ref=e170]: Our keyword difficulty calculation uses the same comprehensive database that powers Semrush's Keyword Magic Tool and Keyword Overview platforms, giving you access to enterprise-level keyword research for free.
