    - generic [ref=e96]:
      - generic [ref=e98]:
        - paragraph [ref=e99]:
          - text: Stretching from the steppes of Central Asia and Mongolia to the tropical jungles of Laos and Vietnam,
          - link "China" [ref=e100] [cursor=pointer]:
            - /url: /destinations/china
          - text: is a land of endless travel opportunities. After reopening to international travel in 2023 following the COVID-19 pandemic, China made several changes to its visa policies to encourage more visitors.
        - paragraph [ref=e101]: Here is everything you need to know about obtaining a tourist visa for China. Always check the latest regulations with the Chinese authorities before you travel, as policies may change.
        - heading "Who needs a Chinese tourist visa?" [level=3] [ref=e102]
        - paragraph [ref=e103]:
          - text: The majority of foreign nationals require a tourist visa (also known as an "L visa") to enter and visit mainland China, though an increasing number of nationalities are granted visa-free entry. L visas can be obtained from Chinese embassies and consulates around the world, or through the
          - link "Chinese Visa Application Service Center" [ref=e104] [cursor=pointer]:
            - /url: https://www.visaforchina.org/
          - text: . To avoid the tedious bureaucracy when applying in person, many people obtain a visa via a tour operator or visa agent.
        - figure "The Forbidden City in Beijing. zhangshuang/Getty Images" [ref=e105]:
          - img "Aerial view of the Forbidden City in Beijing, China. The image shows the sprawling complex of traditional Chinese imperial buildings with golden roofs and red walls. In the foreground is the main entrance gate with a large courtyard. The city skyl..."
          - generic [ref=e106]: The Forbidden City in Beijing. zhangshuang/Getty Images
        - heading "Can I travel visa-free to China?" [level=3] [ref=e107]
        - paragraph [ref=e108]: "As of September 2024, citizens from a handful of countries can travel visa-free to mainland China for tourism or business purposes. The following nationalities allow a 15-day visa-free entry: Malaysia, Switzerland, Ireland, Hungary, Austria, Belgium, Luxembourg, France, Germany, Italy, the Netherlands, Spain and Norway."
        - heading "Who can get a transit visa?" [level=3] [ref=e109]
        - paragraph [ref=e110]:
          - text: Visitors from 53 countries – including the US, Canada, UK, the EU, Japan, New Zealand, Brazil and Argentina – can spend up to 144 hours (6 days) transiting in China without a visa if they arrive by air, ship or train at selected Chinese cities. The list of cities includes Beijing, Shanghai, Xi’an, Guilin, Chongqing, Chengdu, Xiamen, Wuhan, Kunming, and Qingdao, opening up some interesting quick trip opportunities.
          - text: To be eligible, travelers must hold a passport valid for at least 3 months after entry and proof of onward travel to a third country. These visas start from the time the traveler arrives at the Chinese border and receives an entry permit. Check with your nearest Chinese embassy or consulate for the current list of eligible nationalities, entry points and specific movement areas.
        - figure "Hong Kong and Macau have visa-free entry for most nationalities. BerryJ / Shutterstock" [ref=e111]:
          - img "A city skyline at night, with trees in the foreground and colorful skyscrapers in the background"
          - generic [ref=e112]: Hong Kong and Macau have visa-free entry for most nationalities. BerryJ / Shutterstock
        - heading "What about Hong Kong and Macau?" [level=3] [ref=e113]
        - paragraph [ref=e114]:
          - text: Most nationalities do not require a tourist visa for stays of up to 90 days in either Hong Kong or Macau. To travel from there into China proper, a standard tourist visa is required. These are fairly easy to obtain via
          - link "China Travel Service" [ref=e115] [cursor=pointer]:
            - /url: https://ww1.ctshk.com/en/
          - text: in Hong Kong.
        - paragraph [ref=e116]:
          - text: Since May 2018, the Chinese resort island of
          - link "Hainan" [ref=e117] [cursor=pointer]:
            - /url: /destinations/china/hainan
          - text: has offered 30-day
          - link "visa-free entry" [ref=e118] [cursor=pointer]:
            - /url: http://en.hnftp.gov.cn/tips/policy/202003/t20200317_3263796.html
          - text: to citizens of 59 countries including the US, Canada, the EU, the UK, New Zealand, Malaysia and Singapore. You can’t leave Hainan island and travel to mainland China on this visa – if you want to roam deeper into China, you'll need a standard tourist visa.
        - heading "How about Tibet?" [level=3] [ref=e119]
        - paragraph [ref=e120]:
          - text: To travel to
          - link "Tibet" [ref=e121] [cursor=pointer]:
            - /url: /destinations/china/tibet
          - text: by air, road or train, you'll need both a China tourist visa (L visa) and a Tibet Tourism Bureau (TTB) permit. To obtain this mandatory travel document you must book a guide for your entire trip and pre-arrange private transport for trips outside Lhasa. No direct applications are accepted, which effectively means that Tibet can only be visited on an organized tour.
        - heading "How to apply for a Chinese tourist visa" [level=3] [ref=e122]
        - paragraph [ref=e123]: Applying for a Chinese tourist visa in your home country is the most straightforward process. You'll need to fill out an application form, provide a proposed itinerary, flight ticket and proof of accommodation for your first night in China. If your country of residence is different than the country in which you're applying, the Chinese authorities may charge an extra processing fee for non-citizens.
        - paragraph [ref=e124]: Some embassies require extra documentation, such as an invitation letter from a person or a company in China, bank statements, and documents proving your employment record. And your passport needs to be valid for at least 6 months beyond the expiry date of your visa.
        - figure "The ancient Buddha at Leshan. Ungvari Attila/Shutterstock" [ref=e126]:
          - img "A giant stone Buddha carved into rocks. Tourists stand on a platform nearby."
          - generic [ref=e127]: The ancient Buddha at Leshan. Ungvari Attila/Shutterstock
        - heading "How much does a China tourist visa cost?" [level=3] [ref=e128]
        - paragraph [ref=e129]: The cost of a Chinese tourist visa varies depending on the type of visa, the length of stay, the number of entries allowed, and your nationality. Most tourists pay around US$35 for a single entry visa valid for 30 days from the day you enter China.uk citizens pay £130, US citizens pay US$140, Canadian citizens pay C$132, Australian citizens pay A$95 and French, German, Italian, Dutch and Spanish citizens pay €111.
        - paragraph [ref=e130]: Some nationalities are entitled to long-term multiple-entry visas that allow travelers to visit China for stints of 30 to 120 days throughout the duration of the visa. Note these are not residence permits and do not grant any right to live or work in China. Contact your local Chinese embassy or consulate for the latest fees for long-term visas.
        - heading "How long is a Chinese visa valid for?" [level=3] [ref=e131]
        - paragraph [ref=e132]: "Regular China tourist visas are valid for 30 days and must be used within three (or six, if double-entry) months of their date of issue. Never overstay your visa: the fines are high and may result in being banned from visiting China. If you think you'll need to stay longer, start the process of applying for a visa extension well before your visa expires."
        - figure "Cycling through iconic landscapes in Yangshuo, Guilin. GuoZhongHua / Shutterstock" [ref=e133]:
          - img "Cyclist passing hills in Yangshuo, Guilin"
          - generic [ref=e134]: Cycling through iconic landscapes in Yangshuo, Guilin. GuoZhongHua / Shutterstock
        - heading "Can I extend my Chinese visa?" [level=3] [ref=e135]
        - paragraph [ref=e136]: Chinese visas can be extended once without too much difficulty at the Public Security Bureau (PSB) offices found in larger Chinese towns and cities, though an extension is not guaranteed. The process takes between 2 and 7 working days, the fee is ¥160 (or ¥760/469 for US/UK citizens). You can only extend your stay for as long as the duration of your original visa. You’ll need to provide your original passport, two photos and a receipt from your accommodation in the town where you are applying for your extension.
        - paragraph [ref=e137]: Because of the complicated permit system, extending your stay in Tibet is impossible, and Xinjiang, Beijing and Shanghai can also be tricky places to extend a standard tourist visa. A second extension is harder to get, and a third extension is extremely unlikely.
