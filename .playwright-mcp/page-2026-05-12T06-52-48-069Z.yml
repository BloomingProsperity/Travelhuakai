                - generic [ref=e79]:
                  - generic [ref=e80]: Must-visit
                  - generic [ref=e81]: Dongcheng
                - strong [ref=e82]: Forbidden City / Palace Museum
                - paragraph [ref=e83]: "The largest intact imperial palace complex in the world: 180 acres, 980 buildings, 8,728 rooms. 24 emperors lived here across the Ming and Qing dynasties (1420–1912). 7-day advance booking is mandatory; 40,000-person daily cap sells out within minutes for peak weekends."
                - link "Official →" [ref=e84] [cursor=pointer]:
                  - /url: https://intl.dpm.org.cn/visit.html?l=en
              - listitem [ref=e85]:
                - generic [ref=e86]:
                  - generic [ref=e87]: Must-visit
                  - generic [ref=e88]: Huairou
                - strong [ref=e89]: Great Wall at Mutianyu
                - paragraph [ref=e90]: "The Great Wall section most recommended by experienced foreign travellers: well-restored Ming masonry, 23 watchtowers across a 2.25 km open stretch, cable car or chair lift up plus a toboggan descent. The official English website accepts international cards directly. 1 million foreign visitors in 2025."
                - link "Official →" [ref=e91] [cursor=pointer]:
                  - /url: https://en.mutianyugreatwall.com
              - listitem [ref=e92]:
                - generic [ref=e93]:
                  - generic [ref=e94]: Must-visit
                  - generic [ref=e95]: Haidian
                - strong [ref=e96]: Summer Palace
                - paragraph [ref=e97]: The best-preserved imperial garden in China and a UNESCO World Heritage Site. 220-hectare Kunming Lake with Longevity Hill behind it, the 728 m painted Long Corridor, and a theatrical landscape designed for Qing imperial leisure. Audio guides in 19 languages.
                - link "Official →" [ref=e98] [cursor=pointer]:
                  - /url: https://english.beijing.gov.cn/specials/parktours/guidevisitors/summerpalace/
              - listitem [ref=e99]:
                - generic [ref=e100]:
                  - generic [ref=e101]: Must-visit
                  - generic [ref=e102]: Dongcheng
                - strong [ref=e103]: Temple of Heaven
                - paragraph [ref=e104]: The largest extant sacrificial altar complex in China (built 1406–1420), used by every Ming and Qing emperor to pray for harvest. The triple-eaved circular blue-roofed Hall of Prayer for Good Harvests is one of the most architecturally perfect timber structures in Chinese history. The park grounds double as a morning tai chi venue.
                - link "Official →" [ref=e105] [cursor=pointer]:
                  - /url: https://english.beijing.gov.cn/specials/parktours/guidevisitors/templeofheaven/
              - listitem [ref=e106]:
                - generic [ref=e107]:
                  - generic [ref=e108]: Must-visit
                  - generic [ref=e109]: Dongcheng
                - strong [ref=e110]: Lama Temple (Yonghe Gong)
                - paragraph [ref=e111]: The most important Tibetan Buddhist temple in Beijing and one of the most significant Gelug monasteries outside Tibet. Originally an imperial princely mansion (1694), converted to a lamasery in 1744. The Wanfu Pavilion houses an 18 m Maitreya Buddha carved from a single sandalwood tree — the tallest sandalwood statue in the world.
                - link "Official →" [ref=e112] [cursor=pointer]:
                  - /url: https://english.beijing.gov.cn/specials/ticketing/
              - listitem [ref=e113]:
                - generic [ref=e114]:
                  - generic [ref=e115]: Must-visit
                  - generic [ref=e116]: Dongcheng
                - strong [ref=e117]: Tiananmen Square
                - paragraph [ref=e118]: The world's third-largest public square (440,000 sq m) and the symbolic centre of the People's Republic. Daily flag-raising ceremony at sunrise, flag-lowering at sunset. Free entry but mandatory advance reservation (1–7 days ahead) — walk-up visitors are turned back at the security checkpoint.
                - link "Official →" [ref=e119] [cursor=pointer]:
                  - /url: https://english.beijing.gov.cn/travellinginbeijing/
