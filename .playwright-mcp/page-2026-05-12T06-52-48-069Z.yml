          - generic [ref=e566]:
            - generic [ref=e567]: What to know before landing
            - list [ref=e568]:
              - listitem [ref=e569]:
                - strong [ref=e570]: "240-hour transit: onward ticket must leave to a DIFFERENT country"
                - paragraph [ref=e571]: New York → Shanghai → New York is denied at immigration. New York → Shanghai → Singapore is approved. Hong Kong, Macau, and Taiwan count as separate regions for this rule.
              - listitem [ref=e572]:
                - strong [ref=e573]: 240-hour clock starts at the immigration STAMP, not wheels-down
                - paragraph [ref=e574]: Land at 23:00, clear immigration at 00:30 = you've already lost a day. Many travellers miscalculate and overstay.
              - listitem [ref=e575]:
                - strong [ref=e576]: Digital arrival card mandatory since 2025-11; airlines don't tell you
                - paragraph [ref=e577]: Fill the NIA digital card (s.nia.gov.cn) within 72 hours before arrival. Skipping it sends you to a secondary desk that adds 20–40 minutes at the airport.
              - listitem [ref=e578]:
                - strong [ref=e579]: Use the dedicated TWOV counter — wrong queue = +30 min
                - paragraph [ref=e580]: 240-hour transit travellers must use the TWOV counter, not general immigration. Pudong T2 marks it clearly; Beijing T3 barely labels it — look for the small "Visa-Free Transit" sign.
              - listitem [ref=e581]:
                - strong [ref=e582]: Visa-free extensions almost always rejected — apply 8+ days early
                - paragraph [ref=e583]: SmartShanghai staff tried — rejected for "insufficient reason". Processing takes up to 7 working days, so you must apply at least 8 days before expiry. Plan your trip length up front.
              - listitem [ref=e584]:
                - strong [ref=e585]: Overstay penalty = entry ban, not just a fine
                - paragraph [ref=e586]: Overstays beyond a few days trigger a 1–5 year re-entry ban PLUS fines from CNY 500/day. Don't gamble on the last day.
              - listitem [ref=e587]:
                - strong [ref=e588]: Unlicensed guesthouses / Airbnb-style hosts can't legally take foreign guests
                - paragraph [ref=e589]: Chinese law requires accommodation to register foreign guests with police. Budget guesthouses and many Airbnb listings lack the licence. Both you and the host face fines.
              - listitem [ref=e590]:
                - strong [ref=e591]: "Private accommodation: register with police within 24h"
                - paragraph [ref=e592]: Hotels do this for you automatically. At an Airbnb / private rental, you OR your host must register at the local police station (paichusuo) within 24 hours of check-in. Failure is a fine for both parties.
