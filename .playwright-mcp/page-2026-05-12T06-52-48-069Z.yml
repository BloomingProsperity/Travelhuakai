                - generic [ref=e707]:
                  - strong [ref=e708]: Pay at counter or direct-billing
                  - paragraph [ref=e709]: Cash + Alipay/WeChat universal. UnionPay card universal. Visa/MC mainly at IMS/VIP desks. Direct billing only at hospitals contracted with your insurer.
          - generic [ref=e710]:
            - generic [ref=e711]: Practical medical & emergency pitfalls
            - list [ref=e712]:
              - listitem [ref=e713]:
                - strong [ref=e714]: Taxi to hospital is faster than 120 ambulance for non-spinal cases
                - paragraph [ref=e715]: "120 ambulances aren't equipped to Western paramedic standards and average 20+ min in urban traffic. Long-term expats consistently say: for non-spinal emergencies, take a taxi to the nearest 3A hospital."
              - listitem [ref=e716]:
                - strong [ref=e717]: Public hospital admission needs CNY 5K–20K cash deposit upfront
                - paragraph [ref=e718]: Hospitals will stabilise you in the ER, then ask for a CNY 5,000–20,000 deposit before any further treatment. Ambulances charge upfront too — about CNY 7 per km plus CNY 80 per hour of waiting. Most travel insurers reimburse you later, so check your insurer's direct-billing hospital list before you fly.
              - listitem [ref=e719]:
                - strong [ref=e720]: "Public hospitals: get a Medical Card (医疗卡) before any appointment"
                - paragraph [ref=e721]: New patients can't walk in directly. Go to the registration desk first — bring your passport and CNY 50, and allow 15–20 minutes. Head straight to the consultation room without doing this and staff will send you back.
              - listitem [ref=e722]:
                - strong [ref=e723]: International hospital departments cost 6–12× standard rates
                - paragraph [ref=e724]: Beijing United Family, PUMCH international wing, and Raffles Shanghai all have English-speaking staff, but outpatient registration starts at CNY 300–600 versus CNY 10–30 at a standard public department. Plan on CNY 2,000–5,000+ per visit if your insurer doesn't direct-bill.
              - listitem [ref=e725]:
                - strong [ref=e726]: Most Western prescriptions unavailable — bring your own + 20% extra
                - paragraph [ref=e727]: Chinese pharmacies don't stock most Western brand-name medications. Controlled substances (some painkillers, ADHD drugs, anxiety meds) are restricted and may be confiscated at customs without a physician's letter. Bring full supply in original labelled bottles.
              - listitem [ref=e728]:
                - strong [ref=e729]: Beijing has 3 emergency numbers — 999 sometimes faster than 120
                - paragraph [ref=e730]: "Beijing: 120 (public emergency), 999 (Red Cross / private ambulance, faster in some districts), 110 (police). US Embassy medical assistance +86-10-8531-4000. Beijing United 24h ER +86-10-5927-7120. PUMCH 24h ER +86-10-69155288."
