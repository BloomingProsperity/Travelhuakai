            - generic [ref=e125]:
              - generic [ref=e126]: Registration
              - paragraph [ref=e127]: Register at 12306.cn/en using your passport. You'll get either an email magic link or a Chinese-mobile SMS to confirm. Verification usually clears automatically; if it doesn't, upload your passport and a selfie — manual review takes 3–5 working days, or visit any station counter.
            - generic [ref=e128]:
              - generic [ref=e129]: Payment
              - paragraph [ref=e130]: The 12306 English portal accepts Visa, Mastercard, JCB, Diners Club, and UnionPay. Alipay and WeChat Pay also work — the central government expat guide lists both.
            - generic [ref=e131]:
              - generic [ref=e132]: Refund
              - paragraph [ref=e133]: "≥8 days before departure: 0% fee. 48h-8d: 5%. 24-48h: 10%. <24h: 20%. One free change (date/train/seat) until 48h before departure."
            - generic [ref=e134]:
              - generic [ref=e135]: Real-name
              - paragraph [ref=e136]: Passport name on the ticket must match the bio page exactly. Carry passport on board for inspection. E-tickets are linked to passport number.
