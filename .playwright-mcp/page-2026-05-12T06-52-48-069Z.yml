              - heading "Metro payment" [level=4] [ref=e170]
              - paragraph [ref=e171]: "All 29 lines / 523 stations: Visa, Mastercard, UnionPay, JCB, Amex tap-to-ride at every gate (since 2025-06-15). World's first metro to support all 5 networks."
            - generic [ref=e172]:
              - heading "Ride-hail & taxi" [level=4] [ref=e173]
              - paragraph [ref=e174]: DiDi accepts foreign phone + Visa/Mastercard with English UI; in-app 24/7 English customer service. Take official taxi queue at airport, never solicitations inside terminal.
            - generic [ref=e175]:
              - heading "Common pitfalls" [level=4] [ref=e176]
              - list [ref=e177]:
                - listitem [ref=e178]: T1 is not on Capital Airport Express. T2/T3 only — confirm terminal before boarding.
                - listitem [ref=e179]: PEK and PKX are 80 km apart — confirm IATA code before transit.
          - generic [ref=e180]:
            - generic [ref=e181]: Practical transport pitfalls
            - list [ref=e182]:
              - listitem [ref=e183]:
                - strong [ref=e184]: "Beijing Metro tap-and-go: only at end-of-row gate lanes"
                - paragraph [ref=e185]: Since 2024-09 all 490 stations support contactless Visa/Mastercard, but the international-card turnstile is at a specific lane (usually the end of the row). Tapping a domestic-only gate just rejects.
              - listitem [ref=e186]:
                - strong [ref=e187]: "Alipay transit QR: must activate per city"
                - paragraph [ref=e188]: Activating Beijing's transit code does NOT activate Shanghai / Guangzhou / Shenzhen. Open the Transport tab, pick the target city, and activate before reaching the turnstile.
              - listitem [ref=e189]:
                - strong [ref=e190]: Alipay transit QR expires in 5 minutes — regenerate at the gate
                - paragraph [ref=e191]: If you generated the code while walking and 5+ minutes passed, the turnstile rejects it. Regenerate immediately before scanning.
              - listitem [ref=e192]:
                - strong [ref=e193]: 12306 passport verification takes 3–7 days — last-minute booking fails
                - paragraph [ref=e194]: Online passport verification at 12306.cn requires a passport photo plus a selfie holding the passport. Processing typically takes 3–5 days, up to 7 in peak season. New accounts can't book next-day trains. If you're short on time, use Trip.com — verification usually clears in 1–2 hours.
              - listitem [ref=e195]:
                - strong [ref=e196]: Self-service ticket machines reject passports — go to staffed window
                - paragraph [ref=e197]: Auto-collection machines only read Chinese ID cards. Foreign passport holders must queue at staffed windows. At Beijing West / Shanghai Hongqiao that's 20–30 min on a busy day.
              - listitem [ref=e198]:
                - strong [ref=e199]: "Group bookings on 12306: each passport needs its own 3–7 day verification"
                - paragraph [ref=e200]: Adding extra passengers to your 12306 booking means each one's passport runs a separate verification cycle. Family of 4 = all 4 passports must clear before any tickets issue. Use Trip.com for groups.
              - listitem [ref=e201]:
                - strong [ref=e202]: Beijing has 5+ rail stations — book the right one
                - paragraph [ref=e203]: Beijing main, West, South, North, Chaoyang. Different stations are 30–60 min apart by metro. Confirm the specific station name when booking, not just "Beijing".
              - listitem [ref=e204]:
                - strong [ref=e205]: Black taxi touts at Capital T3 information desk — 3–4× meter
                - paragraph [ref=e206]: Men posing as helpers near the T3 taxi info desk single out foreign-looking travellers and quote 3–4× meter. Legitimate Beijing taxis show "Jing B" plates. Anyone who approaches you first isn't legit — walk to the official taxi queue.
              - listitem [ref=e207]:
                - strong [ref=e208]: Use DiDi Chuxing app, NOT "DiDi Rider" international
                - paragraph [ref=e209]: DiDi Rider international has limited mainland coverage. DiDi Chuxing (mainland version) has a full English UI, broader vehicles, and accepts Alipay / WeChat with foreign cards reliably.
        - generic [ref=e211]:
          - heading "Food" [level=2] [ref=e212]
          - article [ref=e213]:
            - generic [ref=e214]:
              - generic [ref=e215]:
                - heading "Local cuisine" [level=3] [ref=e216]
                - button "How to eat it →" [ref=e217] [cursor=pointer]
              - paragraph [ref=e218]: "Peking roast duck — carved tableside, paired with thin pancakes, scallion, and sweet bean sauce. Old-Beijing snacks: noodles with soybean paste, dou-zhi (fermented mung bean), tanghulu skewers, copper-pot mutton hotpot. Halal options widely available."
            - generic [ref=e219]:
              - heading "Foreigner-friendly districts" [level=3] [ref=e220]
              - paragraph [ref=e221]: Sanlitun (foreign restaurants, English menus common); Guomao CBD (international hotel dining); Wangfujing snack street; Hutong areas of central axis.
            - generic [ref=e222]:
              - heading "Delivery apps" [level=3] [ref=e223]
              - paragraph [ref=e224]: Meituan and Ele.me both require a Chinese mobile number for SMS verification plus a domestic payment method. Ask your hotel concierge to order for you, or stick to restaurants you can walk into.
            - generic [ref=e225]:
              - heading "Pitfalls" [level=3] [ref=e226]
              - list [ref=e227]:
                - listitem [ref=e228]: Tea ceremony scams near tourist areas (Wangfujing/Houhai). Walk away if invited by 'students' to a tea house.
                - listitem [ref=e229]: Some smaller hutong shops are cash-only; Visa swipe is rare outside hotels.
          - article [ref=e230]:
            - generic [ref=e231]:
              - heading "Allergy / dietary card (show to staff)" [level=3] [ref=e232]
              - paragraph [ref=e233]: Fill in your allergen in both versions. Save a screenshot before you fly.
            - generic [ref=e234]:
              - generic [ref=e235]: I am severely allergic to ____. I cannot eat or come into contact with any soup, sauce, oil, ingredients, or cookware that contain ____. Please do not include ____. If you are unsure, please tell me. Thank you.
              - generic [ref=e236]: 我对 ____ 严重过敏，不能吃，也不能接触含有 ____ 的汤、酱、油、配料或厨具。请不要放 ____。如果不确定，请告诉我。谢谢。
          - generic [ref=e237]:
            - generic [ref=e238]: Practical food pitfalls
            - list [ref=e239]:
              - listitem [ref=e240]:
                - strong [ref=e241]: "\"Vegetarian\" dishes often cooked in pork stock or lard"
                - paragraph [ref=e242]: Ordering a vegetable dish at a regular restaurant doesn't make it vegetarian — many are blanched in pork-bone broth or stir-fried in lard. Only Buddhist vegetarian restaurants (素食 Su Shi) reliably skip pork — but they use seitan (pure gluten) for mock meats, a separate problem for coeliacs.
              - listitem [ref=e243]:
                - strong [ref=e244]: Soy sauce contains wheat — "no soy" rarely eliminates gluten
                - paragraph [ref=e245]: 酱油 jiangyou contains wheat and is in nearly every wok dish. Asking for "no soy sauce" usually means less, not none. Truly gluten-free eating in China requires steamed dishes ordered in writing to the kitchen.
              - listitem [ref=e246]:
                - strong [ref=e247]: Dried shrimp / shrimp paste hidden in non-seafood dishes
                - paragraph [ref=e248]: Dried shrimp (虾皮) and shrimp paste (虾酱) are routinely added to vegetable stir-fries, congee, and soups as flavour enhancers. Menu shows zero seafood. Show a Chinese-language allergy card directly to KITCHEN staff, not just the waiter.
              - listitem [ref=e249]:
                - strong [ref=e250]: Shared woks = cross-contamination even when staff understand the allergy
                - paragraph [ref=e251]: Traditional kitchens use 1–2 woks for everything, rinsed only with hot water between dishes. Severe allergies need restaurants with visibly separated cooking equipment.
              - listitem [ref=e252]:
                - strong [ref=e253]: "Tea house scam: \"practice English\" → CNY 500–5000 bill"
                - paragraph [ref=e254]: Documented at Wangfujing / Houhai (BJ), Nanjing Road / People's Park (SH), Shamian Island (GZ). The new "friend" disappears; staff block exits until payment. If you walk in with strangers, demand to see a menu with prices BEFORE sitting down.
              - listitem [ref=e255]:
                - strong [ref=e256]: Tourist-area restaurants short-change by CNY 20–100
                - paragraph [ref=e257]: Documented near Shamian (GZ), Yu Garden (SH), Wangfujing (BJ). Count change immediately; demand an itemised receipt (发票 fapiao) before paying.
              - listitem [ref=e258]:
                - strong [ref=e259]: Tap water requires boiling — even in 4-star hotels
                - paragraph [ref=e260]: All four cities' tap water needs boiling before drinking. Hotel rooms include a kettle or filtered dispenser. Ice in budget restaurants may be tap-water-based. Bottled water 2–5 CNY for 550 ml.
