                      - generic [ref=e411]: Both
                      - strong [ref=e412]: Set up both apps 2–4 weeks before you fly
                    - paragraph [ref=e413]: KYC can take a full day, WeChat may need a friend back home to vouch for you, and your home bank needs time to whitelist Chinese merchants. Try to set this up before you land — leaving it for arrival day usually means a frustrating first night.
                  - listitem [ref=e414]:
                    - generic [ref=e415]:
                      - generic [ref=e416]: Alipay
                      - strong [ref=e417]: Don't bother with Tour Card — shutting down 2026-05-29
                    - paragraph [ref=e418]: The Alipay Tour Card mini-program stops accepting new applications on May 29, 2026. Older guides still recommend it; ignore them and bind your Visa/Mastercard directly to the regular Alipay app instead.
                  - listitem [ref=e419]:
                    - generic [ref=e420]:
                      - generic [ref=e421]: Both
                      - strong [ref=e422]: "Call your bank: whitelist China + enable international online purchases"
                    - paragraph [ref=e423]: "The #1 card-binding failure is your home bank fraud system blocking the first attempt. The app shows ambiguous \"payment failed\" with no hint that the bank is the cause. Some debit cards also need 3D Secure / international online purchases manually enabled."
                  - listitem [ref=e424]:
                    - generic [ref=e425]:
                      - generic [ref=e426]: WeChat
                      - strong [ref=e427]: "WeChat friend-scan: line one up before you fly"
                    - paragraph [ref=e428]: About 80% of new WeChat accounts hit a mandatory "have a friend scan this QR" screen. The verifier must have used WeChat 6+ months, have WeChat Pay active, and not have verified anyone else this month. Remote scan via screen-share works — solo travellers should ask a friend in advance.
                  - listitem [ref=e429]:
                    - generic [ref=e430]:
                      - generic [ref=e431]: WeChat
                      - strong [ref=e432]: Register WeChat before boarding — SMS unreliable on roaming/eSIM
                    - paragraph [ref=e433]: International roaming SMS into China is unreliable and eSIM data access does not guarantee SMS delivery. Complete WeChat registration on home-country signal, not after landing.
              - generic [ref=e434]:
                - heading "Account setup & KYC" [level=4] [ref=e435]
                - list [ref=e436]:
                  - listitem [ref=e437]:
                    - generic [ref=e438]:
                      - generic [ref=e439]: Alipay
                      - strong [ref=e440]: Install the standard Alipay (blue icon) — not AlipayHK
                    - paragraph [ref=e441]: "There is one app for foreign tourists: standard Alipay (Hangzhou Technology Co., bundle id com.eg.android.AlipayGphone). AlipayHK is a separate Hong Kong product that does NOT work on the mainland."
                  - listitem [ref=e442]:
                    - generic [ref=e443]:
                      - generic [ref=e444]: Both
                      - strong [ref=e445]: Turn VPN OFF during KYC, card binding, and payments
                    - paragraph [ref=e446]: Both Alipay and WeChat compare GPS (Beijing) against IP location (e.g. Los Angeles). The mismatch triggers fraud flags that can freeze the account mid-KYC and require a manual support ticket to recover.
                  - listitem [ref=e447]:
                    - generic [ref=e448]:
                      - generic [ref=e449]: Alipay
                      - strong [ref=e450]: Use your passport MRZ name exactly — uppercase, no nicknames
                    - paragraph [ref=e451]: "Real-name verification rejects mismatched names: middle names, hyphenated surnames, double-barrelled names. The app gives no specific reason — it just says \"verification failed\"."
                  - listitem [ref=e452]:
                    - generic [ref=e453]:
                      - generic [ref=e454]: WeChat
                      - strong [ref=e455]: WeChat's USD 0.05 verification charge will trigger your bank's fraud alert
                    - paragraph [ref=e456]: WeChat charges ~$0.05 USD to validate the card during binding. This tiny charge is the most common reason the binding fails. If you see the charge get rejected, immediately approve it in your banking app and retry the binding within the same session.
                  - listitem [ref=e457]:
                    - generic [ref=e458]:
                      - generic [ref=e459]: Alipay
                      - strong [ref=e460]: USD 500 is the real KYC threshold — not the PBOC USD 5,000 figure
                    - paragraph [ref=e461]: PBOC raised the policy limit to USD 5,000/tx in 2024, but Alipay's own identity-verification system kicks in at USD 500. Plan for the lower number when budgeting big-ticket items (hotel deposits, high-speed rail).
                  - listitem [ref=e462]:
                    - generic [ref=e463]:
                      - generic [ref=e464]: WeChat
                      - strong [ref=e465]: "WeChat: hard RMB 15,000 stay-total cap until you finish real-name auth"
                    - paragraph [ref=e466]: Skip real-name authentication and WeChat caps your total spend for the entire stay at ~RMB 15,000 — not per transaction or per day, but cumulative. That ceiling arrives faster than most people expect. Complete real-name before your first big purchase.
              - generic [ref=e467]:
                - heading "Day 1 paying" [level=4] [ref=e468]
                - list [ref=e469]:
                  - listitem [ref=e470]:
                    - generic [ref=e471]:
                      - generic [ref=e472]: Both
                      - strong [ref=e473]: Personal QR codes reject foreign cards — let merchant scan you instead
                    - paragraph [ref=e474]: "Street vendors and small restaurants almost always show a personal collection QR (个人收款码), not a business merchant code. These only accept payment from RMB wallet balance or a Chinese bank card — your foreign-card-backed Alipay/WeChat is rejected. Workaround: open YOUR app's payment barcode and ask them to scan you. Reverse direction usually works."
                  - listitem [ref=e475]:
                    - generic [ref=e476]:
                      - generic [ref=e477]: Alipay
                      - strong [ref=e478]: Over RMB 200? Split the bill — Alipay charges 3% above that
                    - paragraph [ref=e479]: "Alipay foreign-card transactions: 0% fee under RMB 200, 3% over. Splitting a 400 RMB bill into two 200 RMB scans eliminates the fee. Cashiers in China understand split payment without explanation."
                  - listitem [ref=e480]:
                    - generic [ref=e481]:
                      - generic [ref=e482]: Both
                      - strong [ref=e483]: Carry RMB 200–500 cash — by law (since 2026-02-01) merchants must accept it
                    - paragraph [ref=e484]: "Since 2026-02-01 Chinese law requires merchants to accept physical RMB; refusing now carries penalties. Reliable cash sources: 7-Eleven / FamilyMart / Lawson; ICBC / BOC / CCB ATMs accept Visa/Mastercard with English UI."
                  - listitem [ref=e485]:
                    - generic [ref=e486]:
                      - generic [ref=e487]: WeChat
                      - strong [ref=e488]: Didi / Meituan / Ele.me mini-programs need a +86 SIM
                    - paragraph [ref=e489]: Even with WeChat Pay working, the Didi / Meituan / Ele.me mini-programs INSIDE WeChat require a Chinese mainland phone number to register. Use the standalone Didi app instead (which accepts foreign numbers + foreign cards).
              - generic [ref=e490]:
                - heading "After your trip" [level=4] [ref=e491]
                - list [ref=e492]:
                  - listitem [ref=e493]:
                    - generic [ref=e494]:
                      - generic [ref=e495]: Alipay
                      - strong [ref=e496]: Alipay freezes after ~3 months of inactivity
                    - paragraph [ref=e497]: If you don't open Alipay for about three months after you fly home, your account locks itself. To reactivate, you'll need your passport, a selfie video, and a one-line note explaining the flagged transaction. Most repeat visitors hit this on Day 1 of their next trip — clear it before you fly back.
                  - listitem [ref=e498]:
                    - generic [ref=e499]:
                      - generic [ref=e500]: Alipay
                      - strong [ref=e501]: Refunds take 3–7 business days to your card — not instant to wallet
                    - paragraph [ref=e502]: Foreign-card-backed Alipay refunds go back to the issuing card on a 3–7 business day cycle, not instantly to your Alipay wallet. A failed train booking will show "refunding" for days with no balance in the app — that's normal.
                  - listitem [ref=e503]:
                    - generic [ref=e504]:
                      - generic [ref=e505]: WeChat
                      - strong [ref=e506]: "Foreign WeChat: red packets and P2P transfers are permanently blocked"
                    - paragraph [ref=e507]: Foreign-card-backed WeChat accounts cannot send OR receive red packets, and cannot transfer money to other users — only merchant QR payments work. If a Chinese friend wants to split dinner via WeChat transfer, you'll need an alternative (cash, Alipay merchant scan).
