          - generic [ref=e387]:
            - heading "China Customs thresholds" [level=3] [ref=e388]
            - list [ref=e389]:
              - listitem [ref=e390]:
                - strong [ref=e391]: RMB cash carry limit
                - paragraph [ref=e392]: Carry up to ¥20,000 RMB in cash when crossing the border. Any amount above that must go through a bank — you can't carry it in person.
              - listitem [ref=e393]:
                - strong [ref=e394]: Foreign currency declaration
                - paragraph [ref=e395]: Declare any foreign cash above the USD 5,000 equivalent when you land — customs gives you a paper form at the arrivals desk. Leave it undeclared and the excess can be confiscated.
              - listitem [ref=e396]:
                - strong [ref=e397]: Personal-use goods (non-resident)
                - paragraph [ref=e398]: Personal-use items you're bringing for yourself clear customs duty-free. If you're carrying goods worth more than ¥2,000 that aren't for your own use, declare them at the red channel and pay the assessed duty.
              - listitem [ref=e399]:
