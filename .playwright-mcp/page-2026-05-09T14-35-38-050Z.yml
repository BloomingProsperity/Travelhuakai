        - heading "1. Choose Where to Go" [level=2] [ref=e337]
        - paragraph [ref=e338]:
          - text: With our knowledge of China and feedback from our clients, the following five destinations are recommended for first-timers.
          - strong [ref=e339]: Each one brings something different
          - text: ": ancient culture, stunning landscapes, city life, or even a close-up with China's beloved pandas."
        - paragraph [ref=e340]:
          - img "Top Cities to Visit for First Trip to China" [ref=e341]
        - heading "1) Beijing — Explore China's Imperial Past" [level=3] [ref=e342]
        - generic [ref=e343]:
          - img "Beijing, The Forbbiden City" [ref=e344]
          - generic [ref=e345]: The Forbidden City
        - paragraph [ref=e346]: If it's your first time in China, Beijing is the ideal starting point, where ancient dynasties, iconic landmarks, and vibrant local life all come together.
        - paragraph [ref=e347]:
          - link "The Great Wall" [ref=e348] [cursor=pointer]:
            - /url: /greatwall/section/
          - text: and
          - link "Forbidden City" [ref=e349] [cursor=pointer]:
            - /url: /beijing/forbidden-city/how-to-visit.htm
          - text: are must-sees. To make your visits a fresh twist, try visiting the Forbidden City in Hanfu. It's photogenic and offers a deeper cultural feel.
        - paragraph [ref=e350]:
          - strong [ref=e351]: For a new experience in the Great Wall
          - text: ", you could expect a drone-delivered experience (a fun blend of tradition and tech) at Badaling. Or head to Jinshanling for a sunset picnic on a quieter, more scenic stretch."
        - paragraph [ref=e352]:
          - text: You could also get a feel for daily life with
          - link "a guided hutong walk" [ref=e353] [cursor=pointer]:
            - /url: /beijing/tours/hutong-tour.htm
          - text: ", where Beijing's old neighborhoods still breathe."
        - paragraph [ref=e354]:
          - strong [ref=e355]: If you travel with kids
          - text: ", spend a day at Universal Beijing Resort, or enjoy some fun and educational activities like tai chi in the park, calligraphy, and a local family visit in the hutongs."
        - paragraph [ref=e356]:
          - text: Beijing is also where you can
          - strong [ref=e357]: experience China's futuristic lifestyle
          - text: ", from smart home demonstrations to a ride in an autonomous vehicle."
        - paragraph [ref=e358]:
          - strong [ref=e359]: A Chinese clinic experience
          - text: has become a fresh and popular highlight of a China trip. We'll take you to a local clinic to explore TCM pulse reading, facial diagnosis, and even AI-assisted analysis.
        - paragraph [ref=e360]: You can also try acupuncture, cupping, or tuina. It's available not only in Beijing, but also in Xi'an and Hangzhou.
        - paragraph [ref=e361]:
          - text: See more from our
          - link "11-Day China Family Tour" [ref=e362] [cursor=pointer]:
            - /url: /family-tours/classic-china.htm
          - text: .
        - heading "2) Shanghai — China's Window to the Future" [level=3] [ref=e363]
        - generic [ref=e364]:
          - img "The Bund, Shanghai" [ref=e365]
          - generic [ref=e366]: The Bund, Shanghai
        - paragraph [ref=e367]: Shanghai is where China looks ahead. It is a city of dazzling skylines, global flavors, and vibrant contrasts between the old and the new.
        - paragraph [ref=e368]:
          - strong [ref=e369]: Hop on a ferry
          - text: to cross the Huangpu River. You will see the historical architecture on the Bund as well as the modern skyscrapers opposite, giving you a distinctive contrast between modern life and the post-imperial past.
        - paragraph [ref=e370]: We have specially designed an in-depth Bund culture discovery walking tour for those who want to learn more interesting stories about the Bund and old Shanghai.
        - paragraph [ref=e371]:
          - text: You will
          - strong [ref=e372]: walk a route that few tourists will find
          - text: by themselves, see the most original bricks, and hear some interesting stories that you'll never find in history books.
        - paragraph [ref=e373]: To feel the city's softer side, we recommend walking through the tree-lined streets of the French Concession, where Art Deco villas, boutique cafés, and local life blend seamlessly.
        - paragraph [ref=e374]:
          - text: If time permits, extend your tour to Hangzhou or Suzhou for a blend of classical gardens, water towns, and modern high-tech experiences. See our
          - link "5-Day Shanghai and Hangzhou High-Tech Tour" [ref=e375] [cursor=pointer]:
            - /url: /china-tours/high-tech-tour.htm
          - text: .
        - heading "3) Xi'an — Walk Through 2,000 Years of History" [level=3] [ref=e376]
        - generic [ref=e377]:
          - img "Xi'an, The Terracotta Warriors" [ref=e378]
          - generic [ref=e379]: The Terracotta Warriors
        - paragraph [ref=e380]: If you're drawn to China's ancient roots, Xi'an is unmissable. As the capital of 13 dynasties and the starting point of the Silk Road, it offers a deep dive into the foundations of Chinese civilization.
        - paragraph [ref=e381]:
          - link "The Terracotta Warriors" [ref=e382] [cursor=pointer]:
            - /url: /xian/terracotta-army/how-to-visit.htm
          - text: are the city's most iconic highlight, but
          - strong [ref=e383]: we can take your visit a step further
          - text: . With access to a lesser-known museum near the site, you'll get a rare close-up of the first batch of restored warriors.
        - paragraph [ref=e384]: Step into a real conservation lab, where under the guidance of professional restorers, you'll work with authentic Qin-era fragments and try your hand at piecing together a mini terracotta warrior.
        - generic [ref=e385]:
          - img "Lintong Museum" [ref=e386]
          - generic [ref=e387]: You can handle Qin Dynasty relics in the conservation lab.
        - paragraph [ref=e388]:
          - text: In the evening, don't miss
          - strong [ref=e389]: Great Tang All Day Mall
          - text: . It is a dazzling boulevard lit by lanterns and full of performers, street artists, and music. It's the perfect spot to experience Xi'an's modern pulse wrapped in Tang Dynasty charm.
        - paragraph [ref=e390]: Xi'an is also a favorite for Hanfu photography lovers. The city's many historic buildings and atmospheric streets make the perfect backdrop. We can help you dress up and capture it all, from palace walls to quiet temples.
        - heading "4) Guilin — Cruise Through China's Most Iconic Scenery" [level=3] [ref=e391]
        - generic [ref=e392]:
          - img "Guilin Li River" [ref=e393]
          - generic [ref=e394]: Li River
        - paragraph [ref=e395]: First-timers love Guilin for its beautiful landscapes and relaxing places to escape from the cities. It is a true masterpiece of classic rural China.
        - paragraph [ref=e396]:
          - strong [ref=e397]: A Li River cruise
          - text: is the best way to enjoy karst peaks, combined with the Li River.
        - paragraph [ref=e398]: Yangshuo and Longsheng, two counties next to the city of Guilin, offer most of Guilin's top highlights.
        - paragraph [ref=e399]:
          - link "Yangshuo" [ref=e400] [cursor=pointer]:
            - /url: /yangshuo/
          - text: is a place where children can put down their phones and iPads and still be well entertained… by cycling around the idyllic countryside, exploring an undeveloped karst cave, and even experiencing the life and work of a Chinese farmer.
        - paragraph [ref=e401]: Yangshuo also offers a natural, romantic atmosphere for couples. A romantic riverside candlelit dinner set in a mountain retreat garden could be a great way to celebrate your 20th, 30th, 40th, etc., anniversary. Contact us to design a special time for you.
        - paragraph [ref=e402]: If you are interested in minority culture, the Longji Rice Terraces in Longsheng are really a highlight, both for enjoying the magnificent tiered fields and for experiencing the world of the Zhuang and Yao minorities.
        - paragraph [ref=e403]:
          - text: Check more about the
          - link "14-Day Beijing–Xi'an–Zhangjiajie–Guilin–Shanghai" [ref=e404] [cursor=pointer]:
            - /url: /china-tours/natural-wonders-discovery.htm
        - heading "5) Chengdu — Get Close to Pandas" [level=3] [ref=e405]
        - img "Chengdu,the hometown of giant pandas" [ref=e407]
        - paragraph [ref=e408]: If pandas are on your must-see list (and for most visitors, they are), Chengdu is the place to go. But there's much more to this laid-back city than adorable black-and-white bears.
        - paragraph [ref=e409]: An even more special experience would be to have a close encounter with pandas by taking part in our giant panda volunteer program — cleaning the glass of their enclosures, making panda food, watching a panda eat it, and more.
        - paragraph [ref=e410]:
          - strong [ref=e411]: Beyond pandas
          - text: ", Chengdu is all about slowing down and savoring daily life. Sip tea in a centuries-old teahouse while locals play mahjong, explore food through street markets, or enjoy a private face-changing opera encounter, where you can meet the performers and even learn a few tricks."
        - paragraph [ref=e412]:
          - text: You could also easily extend your trip to
          - link "Jiuzhaigou National Park" [ref=e413] [cursor=pointer]:
            - /url: /jiuzhaigou/
          - text: to enjoy its fairyland-like turquoise lakes, colorful forests, and dramatic alpine scenery.
        - heading "If You're Looking for Something beyond the Classic Cities" [level=3] [ref=e414]
        - list [ref=e415]:
          - listitem [ref=e416]:
            - link "Yunnan" [ref=e417] [cursor=pointer]:
              - /url: /yunnan/
              - strong [ref=e418]: Yunnan
            - text: ": If you like snow-capped mountains, slow-paced old towns, and rich ethnic cultures, this is one of China's most beautiful and diverse provinces."
          - listitem [ref=e419]:
            - link "Zhangjiajie" [ref=e420] [cursor=pointer]:
              - /url: /zhangjiajie/
              - strong [ref=e421]: Zhangjiajie
            - text: ": It is great for nature lovers with the floating peaks in Avatar. Let you walk the glass skywalks and hike among the surreal stone pillars."
          - listitem [ref=e422]:
            - link "Chongqing" [ref=e423] [cursor=pointer]:
              - /url: /chongqing/
              - strong [ref=e424]: Chongqing
            - text: ": If you're into dramatic cityscapes, spicy hotpot, and riding a monorail through skyscrapers, this mountain megacity delivers an electric, off-the-beaten-path vibe."
          - listitem [ref=e425]:
            - link "Harbin" [ref=e426] [cursor=pointer]:
              - /url: /harbin/plan-a-trip.htm
              - strong [ref=e427]: Harbin
            - text: ": It is wonderful for a winter trip. This icy city shines with its magical Ice and Snow Festival, Russian-style churches, and frozen fun for the whole family."
          - listitem [ref=e428]:
            - link "Tibet" [ref=e429] [cursor=pointer]:
              - /url: /tibet/
              - strong [ref=e430]: Tibet
            - text: ": If you're drawn to sacred sites, peaceful monasteries, and high-altitude beauty, this spiritual journey offers something unforgettable."
        - paragraph [ref=e431]:
          - text: See our
          - link "18-Day Classic China Tour with Yunnan" [ref=e432] [cursor=pointer]:
            - /url: /china-tours/classic-china-tour-with-yunnan.htm
        - heading "2. Decide How Many Days to Stay" [level=2] [ref=e433]
        - img "How Many Days to Stay" [ref=e435]
        - paragraph [ref=e436]: After a long journey to get to China, you probably won't want to just scratch the surface of China and just take snapshots with the landmark attractions.
        - paragraph [ref=e437]:
          - text: We suggest you take
          - strong [ref=e438]: at least a week
          - text: "for your first trip to see a spectrum of the highlights in the top three cities: Beijing (3–4 days), Xi'an (2 days), and Shanghai (1–2 days). See our"
          - link "8-Day Beijing–Xi'an–Shanghai Tour" [ref=e439] [cursor=pointer]:
            - /url: /china-tours/golden-triangle-tour.htm
          - text: for inspiration.
        - paragraph [ref=e440]:
          - strong [ref=e441]: 2 weeks
          - text: offer more breathing room and variety. You could add places like Chengdu (for pandas), Guilin (for natural beauty), or Zhangjiajie (for epic mountain landscapes). You'll get a deeper experience without feeling too rushed.
        - paragraph [ref=e442]: If you want to dive deeper, consider planning for 3 weeks or more. This gives you time to explore western China like Tibet or Xinjiang or discover hidden gems in places like Yunnan or Guizhou, which reward slow travel.
        - paragraph [ref=e443]:
          - text: Whatever your pace or interest, we could help shape your time in China into something personal, thoughtful, and full of discovery. Just
          - link "contact us" [ref=e444] [cursor=pointer]:
            - /url: /contactus/
          - text: . All our tours are customizable.
        - paragraph [ref=e445]: "Or get ideas from our:"
