    - generic:
      - main [ref=e312]:
        - paragraph [ref=e313]: "Planning a trip to China can feel overwhelming. It's a vast and diverse country, but that also means there's a lot to figure out: Where should you go? How long do you need? Will mobile payments be a problem?"
        - paragraph [ref=e314]: This guide is here to make it all easier. With local insights and practical tips, we'll walk you through the key steps from picking destinations to getting around, so you can plan with confidence and enjoy the journey ahead.
        - heading "Content Preview" [level=2] [ref=e315]
