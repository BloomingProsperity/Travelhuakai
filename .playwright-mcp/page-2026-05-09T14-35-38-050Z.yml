        - heading "6. Do I Need a Visa for China?" [level=2] [ref=e497]
        - paragraph [ref=e498]:
          - text: Traveling to China is now much easier for most international travelers —
          - strong [ref=e499]: visas are not necessary
          - text: .
        - paragraph [ref=e500]: If you're from most of Europe (like Italy, Spain, Germany, France, Belgium, etc), Southeast Asia (like Singapore, Malaysia, Thailand, etc.), Australia, or New Zealand, you can now enter China visa-free for up to 30 days.
        - paragraph [ref=e501]:
          - text: "If you're from the U.S., Canada, the U.K., or other 52 countries, there's still a great option: China currently allows"
          - link "10-day visa-free" [ref=e502] [cursor=pointer]:
            - /url: /travelguide/visa-application/10-day-visa-free.htm
          - text: transit in most cities like Beijing, Shanghai, Chengdu, Zhangjiajie, Chengdu, and Guangzhou.
        - paragraph [ref=e503]: "If you want to stay longer than 10 days, you'll need a tourist (L) visa or an even easier option: let us help you apply for a China Port Visa, which doesn't require a visit to the embassy or consulate."
        - heading "7. What Does a China Trip Really Cost?" [level=2] [ref=e504]
        - paragraph [ref=e505]: Traveling in China is more affordable than many people expect, especially once you're on the ground.
        - paragraph [ref=e506]: The biggest cost for most travelers is the international airfare, which can vary a lot depending on season and departure city. For example, flights from the US or Europe usually range from $1,200 to $3,000 USD for an economy round trip.
        - paragraph [ref=e507]:
          - text: Once you're in China, the cost of a private, comfortable trip is quite reasonable. For a mid- to high-quality private tour including 4–5 star hotels, domestic transport (flights or high-speed trains), attractions, private guide, transfers, and lunch, you can expect to spend around
          - strong [ref=e508]: $220–350 USD
          - text: per day per person.
        - generic [ref=e509]:
          - paragraph [ref=e510]:
            - strong [ref=e511]: "Timing matters:"
          - paragraph [ref=e512]: Hotel and flight prices can increase by 50–100% during China's peak travel times, especially the first weeks of May and October (known as the Golden Weeks), summer vacation, and around Christmas and New Year. Planning your trip outside these windows can help you save significantly.
          - paragraph [ref=e513]: Traveling in spring (March–April) or late autumn (November) can enjoy better prices, pleasant weather, and smaller crowds.
