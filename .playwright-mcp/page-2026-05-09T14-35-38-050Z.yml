        - 'heading "8. Learn How to Pay in China: Go Cashless with Ease" [level=2] [ref=e521]'
        - paragraph [ref=e522]: "China is one of the most cashless countries in the world. In big cities and even small towns, mobile payment is the norm: people pay for everything from metro rides to street food using their phones."
        - paragraph [ref=e523]:
          - text: If you're wondering, "
          - link "Can foreigners use mobile payment in China now" [ref=e524] [cursor=pointer]:
            - /url: /expatslife/payment-methods.htm
          - text: "?\" The answer is yes. It's now easier than ever."
        - paragraph [ref=e525]: You can simply link your international credit card (Visa/Mastercard) to popular apps like WeChat Pay or Alipay. Once set up, you can scan and pay just like locals do — no need to worry about exchanging cash or carrying coins.
        - paragraph [ref=e526]: "Other options:"
        - list [ref=e527]:
          - listitem [ref=e528]:
            - strong [ref=e529]: Cash is still accepted
            - text: ", especially in more traditional places, though it's not always convenient to find change."
          - listitem [ref=e530]:
