          - listitem [ref=e544]:
            - link "FAQ What's the emergency number if something happens? 110 police, 119 fire, 120 ambulance, 122 traffic — all free. Beijing 12345 supports 10 languages 24/7; Shanghai 12345 supports 18 languages (press 7); Guangzhou 960169 is a three-party language bridge." [ref=e545] [cursor=pointer]:
