          - listitem [ref=e573]:
            - 'link "Pitfalls WeChat friend-scan: line one up before you fly About 80% of new WeChat accounts hit a mandatory \"have a friend scan this QR\" screen. The verifier must have used WeChat 6+ months, have WeChat Pay active, and not have verified anyone else this month. Remote scan via screen-share works — solo travellers should ask a friend in advance." [ref=e574] [cursor=pointer]':
