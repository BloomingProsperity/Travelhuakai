          - listitem [ref=e226]:
            - 'link "Attractions Forbidden City / Palace Museum Dongcheng. The largest intact imperial palace complex in the world: 180 acres, 980 buildings, 8,728 rooms. 24 emperors lived here across the Ming and Qing dynasties (1420–1912). 7-day advance booking is mandatory; 40,000-person daily cap sells out within minutes for peak weekends." [ref=e227] [cursor=pointer]':
              - /url: /city/beijing#bj-forbidden-city
              - text: Attractions
              - heading "Forbidden City / Palace Museum" [level=3] [ref=e228]
              - paragraph [ref=e229]: "Dongcheng. The largest intact imperial palace complex in the world: 180 acres, 980 buildings, 8,728 rooms. 24 emperors lived here across the Ming and Qing dynasties (1420–1912). 7-day advance booking is mandatory; 40,000-person daily cap sells out within minutes for peak weekends."
          - listitem [ref=e230]:
            - 'link "Attractions Great Wall at Mutianyu Huairou. The Great Wall section most recommended by experienced foreign travellers: well-restored Ming masonry, 23 watchtowers across a 2.25 km open stretch, cable car or chair lift up plus a toboggan descent. The official English website accepts international cards directly. 1 million foreign visitors in 2025." [ref=e231] [cursor=pointer]':
              - /url: /city/beijing#bj-mutianyu
              - text: Attractions
              - heading "Great Wall at Mutianyu" [level=3] [ref=e232]
              - paragraph [ref=e233]: "Huairou. The Great Wall section most recommended by experienced foreign travellers: well-restored Ming masonry, 23 watchtowers across a 2.25 km open stretch, cable car or chair lift up plus a toboggan descent. The official English website accepts international cards directly. 1 million foreign visitors in 2025."
          - listitem [ref=e234]:
            - link "Attractions Summer Palace Haidian. The best-preserved imperial garden in China and a UNESCO World Heritage Site. 220-hectare Kunming Lake with Longevity Hill behind it, the 728 m painted Long Corridor, and a theatrical landscape designed for Qing imperial leisure. Audio guides in 19 languages." [ref=e235] [cursor=pointer]:
              - /url: /city/beijing#bj-summer-palace
              - text: Attractions
              - heading "Summer Palace" [level=3] [ref=e236]
              - paragraph [ref=e237]: Haidian. The best-preserved imperial garden in China and a UNESCO World Heritage Site. 220-hectare Kunming Lake with Longevity Hill behind it, the 728 m painted Long Corridor, and a theatrical landscape designed for Qing imperial leisure. Audio guides in 19 languages.
          - listitem [ref=e238]:
            - link "Attractions Temple of Heaven Dongcheng. The largest extant sacrificial altar complex in China (built 1406–1420), used by every Ming and Qing emperor to pray for harvest. The triple-eaved circular blue-roofed Hall of Prayer for Good Harvests is one of the most architecturally perfect timber structures in Chinese history. The park grounds double as a morning tai chi venue." [ref=e239] [cursor=pointer]:
              - /url: /city/beijing#bj-temple-of-heaven
              - text: Attractions
              - heading "Temple of Heaven" [level=3] [ref=e240]
              - paragraph [ref=e241]: Dongcheng. The largest extant sacrificial altar complex in China (built 1406–1420), used by every Ming and Qing emperor to pray for harvest. The triple-eaved circular blue-roofed Hall of Prayer for Good Harvests is one of the most architecturally perfect timber structures in Chinese history. The park grounds double as a morning tai chi venue.
          - listitem [ref=e242]:
            - link "Attractions Lama Temple (Yonghe Gong) Dongcheng. The most important Tibetan Buddhist temple in Beijing and one of the most significant Gelug monasteries outside Tibet. Originally an imperial princely mansion (1694), converted to a lamasery in 1744. The Wanfu Pavilion houses an 18 m Maitreya Buddha carved from a single sandalwood tree — the tallest sandalwood statue in the world." [ref=e243] [cursor=pointer]:
              - /url: /city/beijing#bj-lama-temple
              - text: Attractions
              - heading "Lama Temple (Yonghe Gong)" [level=3] [ref=e244]
              - paragraph [ref=e245]: Dongcheng. The most important Tibetan Buddhist temple in Beijing and one of the most significant Gelug monasteries outside Tibet. Originally an imperial princely mansion (1694), converted to a lamasery in 1744. The Wanfu Pavilion houses an 18 m Maitreya Buddha carved from a single sandalwood tree — the tallest sandalwood statue in the world.
          - listitem [ref=e246]:
            - link "Attractions Tiananmen Square Dongcheng. The world's third-largest public square (440,000 sq m) and the symbolic centre of the People's Republic. Daily flag-raising ceremony at sunrise, flag-lowering at sunset. Free entry but mandatory advance reservation (1–7 days ahead) — walk-up visitors are turned back at the security checkpoint." [ref=e247] [cursor=pointer]:
              - /url: /city/beijing#bj-tiananmen
              - text: Attractions
              - heading "Tiananmen Square" [level=3] [ref=e248]
              - paragraph [ref=e249]: Dongcheng. The world's third-largest public square (440,000 sq m) and the symbolic centre of the People's Republic. Daily flag-raising ceremony at sunrise, flag-lowering at sunset. Free entry but mandatory advance reservation (1–7 days ahead) — walk-up visitors are turned back at the security checkpoint.
          - listitem [ref=e250]:
            - 'link "Attractions The Bund Huangpu. Shanghai''s essential postcard view: a 1.5 km Huangpu River promenade where early-20th-century banks and trading houses face the Pudong skyline. The simplest place to read both Shanghai''s treaty-port past and its vertical-finance present in one frame. Sunrise for low crowds; evening for the skyline lights." [ref=e251] [cursor=pointer]':
              - /url: /city/shanghai#sh-bund
              - text: Attractions
              - heading "The Bund" [level=3] [ref=e252]
              - paragraph [ref=e253]: "Huangpu. Shanghai's essential postcard view: a 1.5 km Huangpu River promenade where early-20th-century banks and trading houses face the Pudong skyline. The simplest place to read both Shanghai's treaty-port past and its vertical-finance present in one frame. Sunrise for low crowds; evening for the skyline lights."
          - listitem [ref=e254]:
            - 'link "Attractions Yu Garden Huangpu. Shanghai''s best central classical Chinese garden: Ming-dynasty rockeries, pavilions, ponds, zigzag bridges, the City God Temple area, and the surrounding old-city bazaar streets all compressed into a walkable historic quarter. The clearest contrast to the Bund''s European riverfront." [ref=e255] [cursor=pointer]':
