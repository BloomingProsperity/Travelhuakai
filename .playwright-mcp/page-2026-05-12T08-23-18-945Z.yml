          - listitem [ref=e258]:
            - link "Attractions Shanghai Tower Pudong. China's highest observation deck and the clearest \"future Shanghai\" attraction. The 118th-floor Top of Shanghai Observatory gives a 360° view over Lujiazui, the Bund, Suzhou Creek, and the city's full scale. Heavily affected by haze, rain, and low cloud — book close to the visit date." [ref=e259] [cursor=pointer]:
