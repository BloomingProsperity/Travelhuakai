          - listitem [ref=e270]:
            - 'link "Attractions Shanghai Museum (People''s Square) Huangpu. The strongest single stop for ancient Chinese art in central Shanghai: bronzes, ceramics, jade, calligraphy, painting, seals, furniture. Since 2025-09 individual visitors no longer need reservations for the People''s Square site during normal periods — entry with passport. Closed Mondays." [ref=e271] [cursor=pointer]':
