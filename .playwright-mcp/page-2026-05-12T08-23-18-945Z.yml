          - listitem [ref=e532]:
            - link "FAQ Will my foreign credit card work in China? Set up Alipay or WeChat Pay before you fly and link a Visa or Mastercard. PBOC raised the cap to USD 5,000 per transaction / USD 50,000 annually in 2024. Standalone Visa/Mastercard swipes work mainly at airports, hotels, and major retailers." [ref=e533] [cursor=pointer]:
