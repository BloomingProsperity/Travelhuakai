            - link "Pitfalls Turn VPN OFF during KYC, card binding, and payments Both Alipay and WeChat compare GPS (Beijing) against IP location (e.g. Los Angeles). The mismatch triggers fraud flags that can freeze the account mid-KYC and require a manual support ticket to recover." [ref=e586] [cursor=pointer]:
