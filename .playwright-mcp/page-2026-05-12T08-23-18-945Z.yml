          - listitem [ref=e565]:
            - link "Pitfalls Don't bother with Tour Card — shutting down 2026-05-29 The Alipay Tour Card mini-program stops accepting new applications on May 29, 2026. Older guides still recommend it; ignore them and bind your Visa/Mastercard directly to the regular Alipay app instead." [ref=e566] [cursor=pointer]:
              - /url: /guide/payments#payments
              - text: Pitfalls
              - heading "Don't bother with Tour Card — shutting down 2026-05-29" [level=3] [ref=e567]
