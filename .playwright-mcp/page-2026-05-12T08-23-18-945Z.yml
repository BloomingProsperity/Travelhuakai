          - listitem [ref=e266]:
            - 'link "Attractions Wukang Road & Wukang Mansion Xuhui. The most visitor-friendly slice of the former French Concession: plane-tree streets, garden villas, writer residences, cafes, Ferguson Lane, and the flatiron Wukang Mansion photo spot. Better as a slow walk than a single attraction. Police barriers control the crowds at the photo intersection on weekends." [ref=e267] [cursor=pointer]':
