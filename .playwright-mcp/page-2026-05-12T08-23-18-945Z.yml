          - listitem [ref=e569]:
            - 'link "Pitfalls Call your bank: whitelist China + enable international online purchases The #1 card-binding failure is your home bank fraud system blocking the first attempt. The app shows ambiguous \"payment failed\" with no hint that the bank is the cause. Some debit cards also need 3D Secure / international online purchases manually enabled." [ref=e570] [cursor=pointer]':
              - /url: /guide/payments#payments
              - text: Pitfalls
              - 'heading "Call your bank: whitelist China + enable international online purchases" [level=3] [ref=e571]'
