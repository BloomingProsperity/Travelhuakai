        - list [ref=e560]:
          - listitem [ref=e561]:
            - link "Pitfalls Set up both apps 2–4 weeks before you fly KYC can take a full day, WeChat may need a friend back home to vouch for you, and your home bank needs time to whitelist Chinese merchants. Try to set this up before you land — leaving it for arrival day usually means a frustrating first night." [ref=e562] [cursor=pointer]:
              - /url: /guide/payments#payments
              - text: Pitfalls
              - heading "Set up both apps 2–4 weeks before you fly" [level=3] [ref=e563]
