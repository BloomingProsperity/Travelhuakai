        - list [ref=e523]:
          - listitem [ref=e524]:
            - link "FAQ Do I need a visa to enter China? 50 nationalities have unilateral 30-day visa-free entry; 55 nationalities qualify for 240-hour transit visa-free across 65 ports / 24 provinces. Use the Visa Checker above for your specific passport." [ref=e525] [cursor=pointer]:
              - /url: /guide/notes#top-questions
              - text: FAQ
              - heading "Do I need a visa to enter China?" [level=3] [ref=e526]
              - paragraph [ref=e527]: 50 nationalities have unilateral 30-day visa-free entry; 55 nationalities qualify for 240-hour transit visa-free across 65 ports / 24 provinces. Use the Visa Checker above for your specific passport.
          - listitem [ref=e528]:
            - link "FAQ Do I need to fill in an arrival card? Yes. Since 2025-11-20 the Foreigner Entry/Exit Card can be pre-filled online for free at the official NIA portal. Kiosks and paper cards are still available at the port. Watch out for fake fee-charging sites." [ref=e529] [cursor=pointer]:
              - /url: /guide/notes#top-questions
              - text: FAQ
