              - text: FAQ
              - heading "How much cash can I bring in?" [level=3] [ref=e538]
              - paragraph [ref=e539]: Up to ¥20,000 RMB without declaration. Foreign currency above the equivalent of USD 5,000 must be declared on arrival.
