          - listitem [ref=e274]:
            - link "Attractions Canton Tower Haizhu. At 600 m, the tallest TV/observation tower in China and third tallest in the world. The twisted-waist design is one of Guangzhou's most recognisable silhouettes. Indoor and outdoor observation decks; the glass sky walk and bubble tram revolving outside the structure offer extra thrills. Best at dusk for the daylight-to-LED transition." [ref=e275] [cursor=pointer]:
              - /url: /city/guangzhou#gz-canton-tower
              - text: Attractions
              - heading "Canton Tower" [level=3] [ref=e276]
              - paragraph [ref=e277]: Haizhu. At 600 m, the tallest TV/observation tower in China and third tallest in the world. The twisted-waist design is one of Guangzhou's most recognisable silhouettes. Indoor and outdoor observation decks; the glass sky walk and bubble tram revolving outside the structure offer extra thrills. Best at dusk for the daylight-to-LED transition.
          - listitem [ref=e278]:
            - link "Attractions Shamian Island Liwan. A 0.3 km² sand-bar in the Pearl River that served as the British and French concession from 1859 to 1943. Over 150 European-style buildings — consulates, banks, churches, trading-house villas — shaded by 200-year-old banyan trees. No cars, no admission, no hawkers inside. Often described as the calmest 90 minutes in Guangzhou." [ref=e279] [cursor=pointer]:
              - /url: /city/guangzhou#gz-shamian
              - text: Attractions
              - heading "Shamian Island" [level=3] [ref=e280]
              - paragraph [ref=e281]: Liwan. A 0.3 km² sand-bar in the Pearl River that served as the British and French concession from 1859 to 1943. Over 150 European-style buildings — consulates, banks, churches, trading-house villas — shaded by 200-year-old banyan trees. No cars, no admission, no hawkers inside. Often described as the calmest 90 minutes in Guangzhou.
          - listitem [ref=e282]:
            - link "Attractions Chen Clan Ancestral Hall Liwan. Built 1888–1894 by 72 Chen-surname clans as an exam-preparation hostel and worship site, this compound is the supreme surviving example of Lingnan decorative architecture. Every surface — ridge beams, screen walls, courtyards — is covered in polychrome ceramic figurines, wood carvings, stone reliefs, and brick carvings. \"The Pearl of Lingnan Architecture.\"" [ref=e283] [cursor=pointer]:
              - /url: /city/guangzhou#gz-chen-clan
              - text: Attractions
              - heading "Chen Clan Ancestral Hall" [level=3] [ref=e284]
              - paragraph [ref=e285]: Liwan. Built 1888–1894 by 72 Chen-surname clans as an exam-preparation hostel and worship site, this compound is the supreme surviving example of Lingnan decorative architecture. Every surface — ridge beams, screen walls, courtyards — is covered in polychrome ceramic figurines, wood carvings, stone reliefs, and brick carvings. "The Pearl of Lingnan Architecture."
          - listitem [ref=e286]:
            - link "Attractions Yuexiu Park & Five Rams Statue Yuexiu. The Five Rams Statue (1959, 11 m, 130+ pieces of granite) is Guangzhou's civic symbol, rooted in the legend of five celestial rams who brought rice seeds to bless the city. Yuexiu Park (860,000 sq m) is the city's largest urban park and contains Zhenhai Tower (Ming-dynasty watchtower, now Guangzhou Museum) and remnants of the ancient city wall. Free entry; packed with locals doing tai chi from 6 AM." [ref=e287] [cursor=pointer]:
              - /url: /city/guangzhou#gz-yuexiu-park
              - text: Attractions
              - heading "Yuexiu Park & Five Rams Statue" [level=3] [ref=e288]
              - paragraph [ref=e289]: Yuexiu. The Five Rams Statue (1959, 11 m, 130+ pieces of granite) is Guangzhou's civic symbol, rooted in the legend of five celestial rams who brought rice seeds to bless the city. Yuexiu Park (860,000 sq m) is the city's largest urban park and contains Zhenhai Tower (Ming-dynasty watchtower, now Guangzhou Museum) and remnants of the ancient city wall. Free entry; packed with locals doing tai chi from 6 AM.
          - listitem [ref=e290]:
            - link "Attractions Pearl River Night Cruise Haizhu / Tianhe. The illuminated-skyline cruise is Guangzhou's signature evening activity. The 60–90 min route passes below Canton Tower, along Zhujiang New Town's glittering skyline, past the colonial Shamian shores, and through bridges lit in colour. The 8 PM departure catches the full LED show on Canton Tower." [ref=e291] [cursor=pointer]:
              - /url: /city/guangzhou#gz-pearl-river
              - text: Attractions
              - heading "Pearl River Night Cruise" [level=3] [ref=e292]
              - paragraph [ref=e293]: Haizhu / Tianhe. The illuminated-skyline cruise is Guangzhou's signature evening activity. The 60–90 min route passes below Canton Tower, along Zhujiang New Town's glittering skyline, past the colonial Shamian shores, and through bridges lit in colour. The 8 PM departure catches the full LED show on Canton Tower.
          - listitem [ref=e294]:
            - link "Attractions Baiyun Mountain Baiyun. A 5A national scenic area 12 km from the centre. The Moxing Ridge peak (382 m) gives panoramic views over Greater Guangzhou on clear days. 21 sq km park with cable car, Mingchun Valley aviary (5,000+ birds), Yunxi Botanical Garden, and the Sculpture Park. 20 million visitors per year. Popular for early-morning Cantonese exercise culture." [ref=e295] [cursor=pointer]:
              - /url: /city/guangzhou#gz-baiyun-mountain
              - text: Attractions
              - heading "Baiyun Mountain" [level=3] [ref=e296]
              - paragraph [ref=e297]: Baiyun. A 5A national scenic area 12 km from the centre. The Moxing Ridge peak (382 m) gives panoramic views over Greater Guangzhou on clear days. 21 sq km park with cable car, Mingchun Valley aviary (5,000+ birds), Yunxi Botanical Garden, and the Sculpture Park. 20 million visitors per year. Popular for early-morning Cantonese exercise culture.
