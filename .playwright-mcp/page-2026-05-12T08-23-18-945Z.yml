          - listitem [ref=e262]:
            - 'link "Attractions Lujiazui Skyline & Oriental Pearl Tower Pudong. The compact skyline cluster opposite the Bund: Oriental Pearl Tower, Shanghai Tower, World Financial Center, Jin Mao, IFC, riverside promenades. Iconic photos, sky decks, malls, and easy riverfront contrast with the Bund. Outdoor district free; sky-deck tickets via official ticketing." [ref=e263] [cursor=pointer]':
