          - listitem [ref=e577]:
            - link "Pitfalls Register WeChat before boarding — SMS unreliable on roaming/eSIM International roaming SMS into China is unreliable and eSIM data access does not guarantee SMS delivery. Complete WeChat registration on home-country signal, not after landing." [ref=e578] [cursor=pointer]:
