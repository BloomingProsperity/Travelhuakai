      - heading "What is Keyword Difficulty?" [level=2] [ref=e154]
      - paragraph [ref=e160]: In the world of SEO, Keyword Difficulty is a handy metric which helps you understand how hard it would be to rank for a particular search query.
      - paragraph [ref=e166]:
        - text: People who are new to SEO may confuse ‘Keyword Difficulty’ with ‘Competition’ in the
        - link "Google Keyword Planner" [ref=e167] [cursor=pointer]:
          - /url: https://support.google.com/google-ads/answer/3022575
        - text: . ‘Competition’ only refers to paid search results while ‘Keyword Difficulty’ applies to organic search results.
      - img [ref=e175]
    - separator [ref=e176]
    - generic [ref=e181]:
      - heading "Ahrefs’ Keyword Difficulty metric" [level=2] [ref=e187]
      - paragraph [ref=e193]:
        - text: Google says that links and content relevance are the top ranking metrics for your site's placement in search results. The results of
        - link "our own study" [ref=e194] [cursor=pointer]:
          - /url: https://ahrefs.com/blog/on-page-seo/
        - text: of two million keywords confirm this statement. We see a strong correlation between the number of referring domains a web page has and its position in Google search results. ‘Competition’ only refers to paid search results while ‘Keyword Difficulty’ applies to organic search results.
      - paragraph [ref=e200]: That is why, to calculate Keyword Difficulty, we analyze the search results for a keyword and look at the number of referring domains the top 10 ranking pages have. In simple terms, the more referring domains across the top ranking pages, the higher the Keyword Difficulty.
      - img [ref=e208]
      - paragraph [ref=e214]: Our metric is widely considered the most accurate one. Keyword Difficulty doesn't take into account any on-page factors.
      - paragraph [ref=e220]: Keyword Difficulty evaluates the chances of getting into top 10 of search results (not top 3 or top 1). Apart from backlink profiles and content relevancy, many additional ranking factors come into play among the results of the first page of any search.
    - separator [ref=e221]
