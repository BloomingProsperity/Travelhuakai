      - paragraph [ref=e336]: Ahrefs’ keyword database has 19.2 billion keywords across hundreds of locations. It is already the biggest database on the web, and it’s growing steadily.
      - paragraph [ref=e342]: Whether you are analyzing your own list of keywords or looking at the suggestions in Keywords Explorer, our Keyword Difficulty metric shows you the opportunities you can easily rank for.
