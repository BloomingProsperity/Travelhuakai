            - img "How to Visit China Without a Visa" [ref=e23]
            - generic [ref=e24]:
              - paragraph [ref=e25]: "Want to visit China but don't want to go through the hassle of applying for a Chinese visa? Here are several common ways you might be able to tour China visa-free:"
              - heading "Visa-Free Entry for Specific Nationalities" [level=2] [ref=e26]
              - paragraph [ref=e27]: "Until the end of 2026, citizens of the following 47 countries and territories are able to enjoy a 30-day visa-free stay for tourism, business, cultural exchange, family visits, or transit purposes in China:"
              - heading "Europe" [level=3] [ref=e28]
              - paragraph [ref=e29]: Andorra, Austria, Belgium, Bulgaria, Croatia, Cyprus, Denmark, Estonia, Finland, France, Germany, Greece, Hungary, Iceland, Ireland, Italy, Latvia, Liechtenstein, Luxembourg, Malta, Monaco, Montenegro, Netherlands, North Macedonia, Norway, Poland, Portugal, Romania, Slovakia, Slovenia, Spain, Switzerland, Sweden
              - heading "Asia / Asia Pacific / Middle East" [level=3] [ref=e30]
              - paragraph [ref=e31]: Brunei, South Korea, Japan, Saudi Arabia, Oman, Kuwait, Bahrain
              - heading "Oceania" [level=3] [ref=e32]
              - paragraph [ref=e33]: Australia, New Zealand
              - heading "Americas" [level=3] [ref=e34]
              - paragraph [ref=e35]: Brazil, Argentina, Chile, Peru, Uruguay
              - paragraph [ref=e36]: For foreigners eligible under the visa-free policy—for business, tourism, visiting relatives or friends, exchange visits, or transit—no documents are required aside from a valid passport. However, we recommend carrying supporting documents that match your purpose of visit, such as an invitation letter, airline tickets, and hotel reservations.
              - paragraph [ref=e37]: Foreigners who qualify for visa-free entry may do so multiple times. Currently, there are no restrictions on the number of entries or the cumulative length of stay.
              - paragraph [ref=e38]: "30 days is more than enough to visit the most highlight tourist destinations in China. Here are several popular China itineraries for your reference:"
              - list [ref=e39]:
                - listitem [ref=e40]:
                  - link "Golden Triangle of China - 9 days Beijing, Xian, Shanghai tour" [ref=e41] [cursor=pointer]:
                    - /url: https://www.thechinaguide.com/experience/golden-triangle-of-china
                - listitem [ref=e42]:
                  - link "The Classic China Tour - 13 days Beijing, Xian, Guilin, Yangshuo, Shanghai tour" [ref=e43] [cursor=pointer]:
                    - /url: https://www.thechinaguide.com/experience/the-classic-china-tour
                - listitem [ref=e44]:
                  - link "The Golden Triangle Plus Zhangjiajie - 11-Day Beijing-Xi'an-Zhangjiajie-Fenghuang-Shanghai Tour" [ref=e45] [cursor=pointer]:
                    - /url: https://www.thechinaguide.com/experience/the-golden-triangle-plus-zhangjiajie
                - listitem [ref=e46]:
                  - link "Chengdu and Golden Triangle - 13-day Beijing, Xi'an, Chengdu, Shanghai tour" [ref=e47] [cursor=pointer]:
                    - /url: https://www.thechinaguide.com/experience/chengdu-and-golden-triangle
                - listitem [ref=e48]:
                  - link "Romantic China Journey - 19-day Beijing-Luoyang-Xi'an-Tibet-Chongqing-Yangtze River-Zhangjiajie-Shanghai Tour" [ref=e49] [cursor=pointer]:
                    - /url: https://www.thechinaguide.com/experience/romantic-china-journey
              - paragraph [ref=e50]: Of course, we can completely custom the itinerary according to your schedule and preference.
              - paragraph [ref=e52]:
                - img "Great Wall of China" [ref=e53]
              - heading "10-Day Visa-Free Transit" [level=2] [ref=e54]
              - paragraph [ref=e55]: China allows nationals of 54 countries to stay for up to 10 days without a visa when transiting through specific Chinese cities. Taking advantage of the visa-free transit policy, travelers can visit most of the popular tourism cities in China.
              - heading "Nationals of which 54 countries can apply for transit visa exemption:" [level=3] [ref=e56]
              - list [ref=e57]:
                - listitem [ref=e58]: Australia, Argentina, Austria, Albania;
                - listitem [ref=e59]: Brazil, Belgium, Bulgaria, Bosnia and Herzegovina, Belarus, Brunei;
                - listitem [ref=e60]: Canada, Chile, Czech Republic, Cyprus, Croatia;
                - listitem [ref=e61]: Denmark;
                - listitem [ref=e62]: Estonia;
                - listitem [ref=e63]: France, Finland;
                - listitem [ref=e64]: Germany, Greece;
                - listitem [ref=e65]: Hungary;
                - listitem [ref=e66]: Italy, Ireland, Iceland;
                - listitem [ref=e67]: Japan;
                - listitem [ref=e68]: Latvia, Lithuania, Luxembourg;
                - listitem [ref=e69]: Mexico, Malta, Monaco, Montenegro;
                - listitem [ref=e70]: Netherlands, New Zealand, Norway, North Macedonia;
                - listitem [ref=e71]: Poland, Portugal;
                - listitem [ref=e72]: Qatar;
                - listitem [ref=e73]: Romania, Russia;
                - listitem [ref=e74]: Spain, Sweden, Switzerland, Singapore, Slovakia, Slovenia, Serbia, South Korea;
                - listitem [ref=e75]: United States, United Kingdom, UAE, Ukraine;
              - heading "Popular Chinese Cities for Transit & Layover Tours" [level=3] [ref=e76]
              - paragraph [ref=e77]:
                - text: As the capital and top tourist city of China,
                - link "Beijing" [ref=e78] [cursor=pointer]:
                  - /url: https://www.thechinaguide.com/destination/beijing
                - text: has a large number of international flights, making it an ideal city for transit and layover tours in China.
              - paragraph [ref=e79]:
                - text: Usually, 2 to 3 days is enough to visit all the highlight attractions in Beijing. But if you don’t have that much time, one day is also ok to visit
                - link "the Great Wall" [ref=e80] [cursor=pointer]:
                  - /url: https://www.thechinaguide.com/destination/great-wall-of-china
                - text: and
                - link "the Forbidden City" [ref=e81] [cursor=pointer]:
                  - /url: https://www.thechinaguide.com/sight/the-forbidden-city
                - text: only.
              - paragraph [ref=e83]:
                - img "Summer Palace" [ref=e84]
              - paragraph [ref=e85]: "Here are three popular Beijing itineraries for your reference:"
              - list [ref=e86]:
                - listitem [ref=e87]:
                  - link "Beijing and the Great Wall Day Tour" [ref=e88] [cursor=pointer]:
                    - /url: https://www.thechinaguide.com/experience/beijing-and-the-great-wall-in-one-day
                - listitem [ref=e89]:
