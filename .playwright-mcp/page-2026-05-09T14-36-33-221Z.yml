              - paragraph [ref=e93]:
                - link "Shanghai" [ref=e94] [cursor=pointer]:
                  - /url: https://www.thechinaguide.com/destination/shanghai
                - text: ", the economic center of China, also has many international flights. If you have a stopover in Shanghai, you can allow one day to visit Shanghai and, if possible, another day to visit"
                - link "Suzhou" [ref=e95] [cursor=pointer]:
                  - /url: https://www.thechinaguide.com/destination/suzhou
                - text: .
              - paragraph [ref=e96]: "Here are two popular Shanghai/Suzhou itineraries for your reference:"
              - list [ref=e97]:
                - listitem [ref=e98]:
                  - link "Shanghai Day Tour" [ref=e99] [cursor=pointer]:
                    - /url: https://www.thechinaguide.com/experience/shanghai-one-day-tour
                - listitem [ref=e100]:
                  - link "Suzhou and Tongli Water Town Day Tour from Shanghai" [ref=e101] [cursor=pointer]:
                    - /url: https://www.thechinaguide.com/experience/suzhou-and-tongli-water-town-day-tour-from-shanghai
              - paragraph [ref=e103]:
                - img "The Bund" [ref=e104]
              - paragraph [ref=e105]:
                - text: Other Chinese cities don't have as many international flights as Beijing or Shanghai, but if you're stopping over in
                - link "Xi’an" [ref=e106] [cursor=pointer]:
                  - /url: https://www.thechinaguide.com/destination/xi%27an
                - text: ","
                - link "Chengdu" [ref=e107] [cursor=pointer]:
                  - /url: https://www.thechinaguide.com/destination/chengdu
                - text: ", or"
                - link "Guilin" [ref=e108] [cursor=pointer]:
                  - /url: https://www.thechinaguide.com/destination/guilin
                - text: ", it’s definitely worth staying a couple of days for sightseeing."
              - paragraph [ref=e110]:
                - img "Terracotta Army" [ref=e111]
              - heading "Visit multiple cities under the 10-day visa-free transit policy" [level=3] [ref=e112]
              - paragraph [ref=e113]:
                - text: Under the 10-day visa-free transit policy, foreigners are allowed to travel outside the city they are transiting in. Therefore, if you are transiting in Beijing or Shanghai, you can actually travel to Xi'an, Shanghai, Suzhou,
                - link "Hangzhou" [ref=e114] [cursor=pointer]:
                  - /url: https://www.thechinaguide.com/destination/hangzhou
                - text: ", Chengdu, Guilin,"
                - link "Zhangjiajie" [ref=e115] [cursor=pointer]:
                  - /url: https://www.thechinaguide.com/destination/zhangjiajie
                - text: ", etc."
              - paragraph [ref=e116]: In addition, you can also enter and exit China via different cities. For example, you can enter via Beijing, spend 8 or 9 days visiting Beijing, Xi’an and Shanghai, and finally exit China via Shanghai.
              - heading "Requirements for Transit Visa Exemption" [level=3] [ref=e117]
              - paragraph [ref=e118]: To apply for a transit visa exemption, the applicant must have an interline plane or train ticket with a specific date and seat departing from China within 10 days and bound for a third country or region. The applicant's passport must be valid for at least three months.
              - paragraph [ref=e119]: The 10-day visa-free stay period begins at 00:00 on the day following entry.
              - heading "Visa-free entry for foreign tourists arriving on cruise ships" [level=2] [ref=e120]
              - paragraph [ref=e121]: Foreign tourists arriving on cruise ships can enter China without a visa if they are part of a group of at least two people organized by a Chinese travel agency. They can travel within coastal provinces and Beijing for up to 15 days. But they must travel to the next port with the same cruise ship and depart from China by the same cruise ship as scheduled.
              - paragraph [ref=e122]: Therefore, if your cruise ship stops at Tianjin Port for 2 days or more, you can go to Beijing for sightseeing. Because it takes about 2.5 hours to drive from Tianjin Port to Beijing, you'd better stay one night in Beijing and return to the ship the next day.
              - paragraph [ref=e123]:
                - generic [ref=e124]:
                  - text: If your cruise ship stops at Shanghai Port,
                  - generic [ref=e125]: you can visit Shanghai or Suzhou on a day tour from your ship.
              - heading "Tips for Visa-Free Travel" [level=2] [ref=e126]
              - paragraph [ref=e127]: Since China’s visa-free policies may change at the time of your travel, please do confirm your eligibility with your local Chinese consulate or embassy before booking.
              - paragraph [ref=e128]: Ensure you meet all requirements, such as having a confirmed onward ticket and an ordinary passport valid for at least 6 months at the time of entry.
              - paragraph [ref=e129]: If you book a tour with us, we can also issue an invitation letter to facilitate your entry into China.
